<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phòng Học 3D – ITA22 8/3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Crosshair & UI Overlay cho 3D */
        #loading-3d {
            position: absolute;
            inset: 0;
            background: #1a1a2e;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: var(--font-main);
        }

        .loader-spinner {
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #tooltip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            margin-top: 40px;
            /* Thụt xuống dưới con trỏ chuôt/tâm */
        }

        /* Modal hiển thị vật phẩm (Bằng khen, Album, Bản đồ) */
        #item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .item-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            color: #fff;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        .item-card h2 {
            color: var(--gold);
            margin-bottom: 15px;
            font-weight: 800;
        }

        .item-card p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
        }

        .btn-close-overlay {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: var(--font-main);
        }

        .btn-close-overlay:hover {
            background: var(--pink);
        }

        /* Nút Home để về lại bản 2D */
        .btn-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: var(--font-main);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .btn-home:hover {
            background: var(--pink);
            border-color: var(--pink);
        }

        .guide {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            pointer-events: none;
            font-family: var(--font-main);
            font-size: 0.8rem;
            z-index: 50;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading-3d">
        <h2>Đang xây dựng phòng học...</h2>
        <div class="loader-spinner"></div>
    </div>

    <a href="index.html" class="btn-home">← Về trang nhập số</a>
    <div class="guide">🖱 Xoay chuột / Vuốt để nhìn xung quanh • CLICK vào thiệp trên bàn & vật phẩm</div>

    <!-- Container chứa 3D -->
    <div id="canvas-container"></div>

    <div id="tooltip">Vật phẩm</div>

    <!-- Item Overlay (Đồ vật đặc biệt) -->
    <div id="item-overlay">
        <div class="item-card">
            <h2 id="item-title">Title</h2>
            <p id="item-desc">Mô tả vật phẩm...</p>
            <button class="btn-close-overlay" onclick="closeItemOverlay()">Đóng lại</button>
        </div>
    </div>

    <!-- CARD DISPLAY SCREEN (Tái sử dụng từ màn HTML kia) -->
    <div class="screen" id="screen-card"
        style="display:none; position:absolute; inset:0; z-index:200; background: rgba(0,0,0,0.7); pointer-events:none;">
        <div class="card-wrap" style="pointer-events:auto;">
            <div class="flower-deco top-left">🌺</div>
            <div class="flower-deco top-right">🌸</div>
            <div class="glass-card profile-card" style="box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
                <div class="tag-83">NGÀY QUỐC TẾ PHỤ NỮ 8/3</div>
                <div class="big-title script-font">Happy Women's Day</div>
                <div class="photo-wrap">
                    <div class="photo-ring">
                        <img id="card-photo" src="photos/default.jpg" alt="Ảnh học sinh" />
                    </div>
                    <div class="photo-badge">💐</div>
                </div>
                <div class="card-name" id="card-name"></div>
                <div class="card-id" id="card-id"></div>
                <div class="card-msg-box">
                    <div class="card-msg" id="card-msg"></div>
                </div>
                <div class="card-info">
                    <div class="info-row">⏰ <span>Thời gian: 13h00 – 08/3/2026 (Chủ nhật)</span></div>
                    <div class="info-row">📍 <span>Phòng học ITA22 nhé!</span></div>
                </div>
                <button class="btn-primary btn-back" onclick="closeStudentCard()">← Đóng</button>
            </div>
            <div class="flower-deco bot-left">🌷</div>
            <div class="flower-deco bot-right">🌺</div>
        </div>
    </div>

    <!-- Three.js + OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script src="data.js"></script>
    <script src="room.js"></script>

</body>

</html>
